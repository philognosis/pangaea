services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pangaea
      POSTGRES_PASSWORD: pangaea
      POSTGRES_DB: pangaea
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pangaea"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--js", "--http_port", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    ports:
      - "8080:8080"
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./keycloak/realm-pangaea.json:/opt/keycloak/data/import/realm-pangaea.json
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/realms/pangaea || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  timesheet-stub:
    build:
      context: ../stubs/timesheet
    ports:
      - "8101:8101"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8101/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  people-data-stub:
    build:
      context: ../stubs/people-data
    ports:
      - "8102:8102"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8102/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  permissions-stub:
    build:
      context: ../stubs/permissions
    ports:
      - "8103:8103"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8103/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  registry:
    build:
      context: ../services/registry
    ports:
      - "8201:8201"
    environment:
      - DATABASE_URL=postgresql://pangaea:pangaea@postgres:5432/pangaea
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8201/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  broker:
    build:
      context: ../services/broker
    ports:
      - "8202:8202"
    environment:
      - REGISTRY_URL=http://registry:8201
      - JWT_SECRET=${JWT_SECRET:-pangaea-dev-secret-change-in-prod}
    depends_on:
      registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8202/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: ../services/gateway
    ports:
      - "8200:8200"
    environment:
      - TIMESHEET_URL=http://timesheet-stub:8101
      - BROKER_URL=http://broker:8202
      - REDIS_URL=redis://redis:6379/0
      - NATS_URL=nats://nats:4222
    depends_on:
      broker:
        condition: service_healthy
      timesheet-stub:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8200/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  router:
    build:
      context: ../services/router
    ports:
      - "8203:8203"
    environment:
      - REGISTRY_URL=http://registry:8201
    depends_on:
      registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8203/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
