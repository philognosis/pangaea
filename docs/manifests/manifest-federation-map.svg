<!-- ═══ LEGEND ═══════════════════════════════════════════════════════════════ -->
<rect x="40" y="650" width="1020" height="72" rx="8" fill="#0D1322" stroke="#1E293B"/>
<text x="60" y="673" class="h" fill="#E2E8F0">Federation rules shown in these manifests</text>
<line x1="60"  y1="692" x2="110" y2="692" stroke="#2DD4BF" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#at)"/>
<text x="116" y="696" class="m" fill="#5EEAD4">ref → directory#Entity (entity spine)</text>
<line x1="340" y1="692" x2="390" y2="692" stroke="#4ADE80" stroke-width="1" stroke-dasharray="3 4" marker-end="url(#ag)"/>
<text x="396" y="696" class="m" fill="#86EFAC">enriches from: evals</text>
<line x1="560" y1="692" x2="610" y2="692" stroke="#22D3EE" stroke-width="1" stroke-dasharray="3 4" marker-end="url(#ac)"/>
<text x="616" y="696" class="m" fill="#67E8F9">enriches from: staffing</text>
<line x1="780" y1="692" x2="830" y2="692" stroke="#E879F9" stroke-width="1" stroke-dasharray="3 4" marker-end="url(#am)"/>
<text x="836" y="696" class="m" fill="#F0ABFC">enriches from: learning</text>
<text x="60" y="714" class="m" fill="#475569">Enrichment = read-only context hint fetched by platform on demand. No capability stores another's data at rest.</text>
</svg>
