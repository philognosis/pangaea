<path d="M550 198 L 550 146" fill="none" stroke="#2DD4BF" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#at)"/>
<path d="M910 198 C 910 170, 610 160, 610 146" fill="none" stroke="#2DD4BF" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#at)"/>

