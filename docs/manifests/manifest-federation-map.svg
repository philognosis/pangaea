<path d="M700 360 C 730 360, 730 380, 760 380" fill="none" stroke="#4ADE80" stroke-width="1" stroke-dasharray="3 4" marker-end="url(#ag)"/>
<!-- staffing ← learning -->
<path d="M700 380 C 730 380, 730 400, 760 400" fill="none" stroke="#E879F9" stroke-width="1" stroke-dasharray="3 4" marker-end="url(#am)"/>

<!-- learning ← evals (enrichment for dev plan) -->
<path d="M340 420 C 300 420, 300 680, 780 680 C 820 680, 830 450, 778 430" fill="none" stroke="#4ADE80" stroke-width="1" stroke-dasharray="3 4" marker-end="url(#ag)"/>
