<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="920" viewBox="0 0 1200 920">
<style>
  text { font-family: Arial, Helvetica, sans-serif; }
  .h  { font-size:15px; font-weight:700; }
  .s  { font-size:12px; }
  .c  { font-size:11px; font-family: 'Courier New', monospace; }
  .dim{ font-size:11px; }
</style>
<rect width="1200" height="920" fill="#0B0F1A"/>

<!-- USER INTENT -->
<rect x="30" y="30" width="340" height="76" rx="12" fill="#131B2A" stroke="#22D3EE" stroke-width="2"/>
<text x="200" y="58" class="h" fill="#67E8F9" text-anchor="middle">User intent (voice or text)</text>
<text x="200" y="82" class="s" fill="#94A3B8" text-anchor="middle">"Show me everything about my mentee Alex"</text>

<!-- arrow down -->
<line x1="200" y1="108" x2="200" y2="142" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M1 1L9 5L1 9" fill="none" stroke="#475569" stroke-width="2"/></marker></defs>

<!-- CONCEPT GRAPH RESOLUTION -->
<rect x="30" y="148" width="340" height="96" rx="12" fill="#131B2A" stroke="#E879F9" stroke-width="2"/>
<text x="200" y="174" class="h" fill="#F0ABFC" text-anchor="middle">Concept graph resolution</text>
<text x="50" y="198" class="c" fill="#94A3B8">entity: "Alex" → acme.directory#Employee</text>
<text x="50" y="216" class="c" fill="#94A3B8">intent: mentee_overview →</text>
<text x="50" y="232" class="c" fill="#94A3B8">  [staffing, feedback, credentials]</text>

<!-- arrow down -->
<line x1="200" y1="246" x2="200" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

<!-- PERMISSION CHECK -->
<rect x="30" y="286" width="340" height="76" rx="12" fill="#131B2A" stroke="#4ADE80" stroke-width="2"/>
<text x="200" y="312" class="h" fill="#86EFAC" text-anchor="middle">Trust fabric</text>
<text x="50" y="334" class="c" fill="#94A3B8">rbac: caller is mentor of Alex ✓</text>
<text x="50" y="350" class="c" fill="#94A3B8">mint 3 × OBO tokens (read-scoped)</text>

<!-- arrow down -->
<line x1="200" y1="364" x2="200" y2="398" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

<!-- PARALLEL DISPATCH -->
<rect x="30" y="404" width="340" height="60" rx="12" fill="#131B2A" stroke="#4ADE80" stroke-width="2"/>
<text x="200" y="430" class="h" fill="#86EFAC" text-anchor="middle">Orchestrator — parallel syscalls</text>
<text x="200" y="452" class="s" fill="#94A3B8" text-anchor="middle">fan-out to 3 systems simultaneously</text>

<!-- fan out lines -->
<line x1="100" y1="466" x2="100" y2="510" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="200" y1="466" x2="200" y2="510" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="300" y1="466" x2="300" y2="510" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- SYSCALL 1 -->
<rect x="30" y="516" width="140" height="120" rx="10" fill="#0D1322" stroke="#2DD4BF" stroke-width="2"/>
<text x="100" y="540" class="h" fill="#5EEAD4" text-anchor="middle">syscall 1</text>
<text x="100" y="558" class="dim" fill="#64748B" text-anchor="middle">Staffing</text>
<text x="42" y="580" class="c" fill="#94A3B8">GET /staff/</text>
<text x="42" y="596" class="c" fill="#94A3B8">history?</text>
<text x="42" y="612" class="c" fill="#94A3B8">emp=alex-99</text>
<text x="42" y="630" class="c" fill="#4ADE80">→ 4 placements</text>

<!-- SYSCALL 2 -->
<rect x="130" y="516" width="140" height="120" rx="10" fill="#0D1322" stroke="#2DD4BF" stroke-width="2"/>
<text x="200" y="540" class="h" fill="#5EEAD4" text-anchor="middle">syscall 2</text>
<text x="200" y="558" class="dim" fill="#64748B" text-anchor="middle">Feedback</text>
<text x="142" y="580" class="c" fill="#94A3B8">query {</text>
<text x="142" y="596" class="c" fill="#94A3B8"> feedback(</text>
<text x="142" y="612" class="c" fill="#94A3B8">  subject:alex)</text>
<text x="142" y="630" class="c" fill="#4ADE80">→ 6 entries</text>

<!-- SYSCALL 3 -->
<rect x="230" y="516" width="140" height="120" rx="10" fill="#0D1322" stroke="#2DD4BF" stroke-width="2"/>
<text x="300" y="540" class="h" fill="#5EEAD4" text-anchor="middle">syscall 3</text>
<text x="300" y="558" class="dim" fill="#64748B" text-anchor="middle">Credentials</text>
<text x="242" y="580" class="c" fill="#94A3B8">GET /certs/</text>
<text x="242" y="596" class="c" fill="#94A3B8">employee/</text>
<text x="242" y="612" class="c" fill="#94A3B8">alex-99</text>
<text x="242" y="630" class="c" fill="#4ADE80">→ 3 certs</text>

<!-- converge -->
<line x1="100" y1="638" x2="100" y2="680" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="200" y1="638" x2="200" y2="680" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="300" y1="638" x2="300" y2="680" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- RESPONSE ASSEMBLY -->
<rect x="30" y="686" width="340" height="60" rx="12" fill="#131B2A" stroke="#E879F9" stroke-width="2"/>
<text x="200" y="712" class="h" fill="#F0ABFC" text-anchor="middle">Response assembly</text>
<text x="200" y="732" class="s" fill="#94A3B8" text-anchor="middle">normalize → schema-bind → A2UI compose</text>

<!-- arrow down -->
<line x1="200" y1="748" x2="200" y2="782" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

<!-- COMPOSITE UI -->
<rect x="30" y="788" width="340" height="76" rx="12" fill="#131B2A" stroke="#22D3EE" stroke-width="2"/>
